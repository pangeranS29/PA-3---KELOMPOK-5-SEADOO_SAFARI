<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Lupa Password</title>
    <style>
        body {
            background: #222;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar, .footer {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            width: 100%;
        }
        .navbar img {
            height: 50px;
        }
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .forgot-box {
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0px 4px 10px rgba(255, 255, 255, 0.1);
        }
        .forgot-box h2 {
            margin-bottom: 20px;
        }
        .forgot-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 2px solid #ffcc00;
            border-radius: 6px;
            font-size: 1em;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            outline: none;
        }
        .forgot-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        .forgot-box button {
            width: 100%;
            padding: 10px;
            background: #ffcc00;
            color: black;
            border: 2px solid white;
            border-radius: 6px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }
        .forgot-box button:hover {
            background: #c1a225;
            transform: scale(1.05);
        }
        .forgot-box .back-login {
            display: block;
            margin-top: 10px;
            color: #ffcc00;
            text-decoration: none;
        }
        .forgot-box .back-login:hover {
            text-decoration: underline;
        }
        .logo {
            max-width: 100px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html">
            <img src="logo.png" alt="Logo">
        </a>
    </nav>
    
    
    <div class="container">
        <div class="forgot-box">
            <h2>Lupa Password</h2>
            <img src="logo.png" alt="Logo" class="logo">
            <p>Masukkan email Anda untuk mengatur ulang password.</p>
            <input type="email" placeholder="Email">
            <button>Kirim Link Reset</button>
            <a href="login.html" class="back-login">Kembali ke Login</a>
        </div>
    </div>
    
    <footer class="footer text-center p-3">
        &copy; 2025 Safari Packages - All Rights Reserved
    </footer>
</body>
</html>
